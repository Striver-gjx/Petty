server:
  port: 18080

spring:
  application:
    name: petty-backend
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:petty;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      table-underline: true

logging:
  level:
    com.petty: DEBUG

petty:
  security:
    dev-bypass: true
  admin:
    phone: "13800000000"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/petty}
    username: ${SPRING_DATASOURCE_USERNAME:petty}
    password: ${SPRING_DATASOURCE_PASSWORD:petty123}
  sql:
    init:
      mode: never
  h2:
    console:
      enabled: false

petty:
  security:
    dev-bypass: false

server:
  port: 8080

---
spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:petty}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8mb4
    username: ${DB_USER:petty}
    password: ${DB_PASS:petty123}
  sql:
    init:
      mode: never
