openapi: 3.0.3
info:
  title: Petty - Review & Payment API
  version: 1.0.0
  description: 评价与支付结算接口

paths:
  /api/v1/reviews:
    post:
      summary: 提交评价
      operationId: createReview
      tags: [Review]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCreateDTO'
      responses:
        '200':
          description: 成功

  /api/v1/reviews/sitter/{sitterId}:
    get:
      summary: 获取喂养师评价列表
      operationId: listSitterReviews
      tags: [Review]
      parameters:
        - name: sitterId
          in: path
          required: true
          schema: { type: integer, format: int64 }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResultReviewVO'

  /api/v1/payments/order/{orderId}:
    get:
      summary: 获取订单支付详情
      operationId: getPaymentByOrder
      tags: [Payment]
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultPaymentVO'

  /api/v1/payments/pay:
    post:
      summary: 发起支付（预授权冻结）
      operationId: initiatePayment
      tags: [Payment]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentInitDTO'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResultPaymentResultVO'

  /api/v1/payments/refund:
    post:
      summary: 申请退款
      operationId: requestRefund
      tags: [Payment]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderId, reason]
              properties:
                orderId: { type: integer, format: int64 }
                reason: { type: string }
      responses:
        '200':
          description: 成功

  /api/v1/withdrawals:
    get:
      summary: 喂养师提现记录
      operationId: listWithdrawals
      tags: [Withdrawal]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: size
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResultWithdrawalVO'
    post:
      summary: 申请提现
      operationId: requestWithdrawal
      tags: [Withdrawal]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount: { type: number }
      responses:
        '200':
          description: 成功

components:
  schemas:
    ReviewCreateDTO:
      type: object
      required: [orderId, rating]
      properties:
        orderId: { type: integer, format: int64 }
        rating: { type: number, minimum: 1, maximum: 5 }
        content: { type: string }
        photoUrls:
          type: array
          items: { type: string }
        tags:
          type: array
          items: { type: string }
        isAnonymous: { type: boolean, default: false }

    ReviewVO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        orderId: { type: integer, format: int64 }
        reviewerType: { type: string, enum: [OWNER, SITTER] }
        reviewerNickname: { type: string }
        reviewerAvatar: { type: string }
        rating: { type: number }
        content: { type: string }
        photoUrls:
          type: array
          items: { type: string }
        tags:
          type: array
          items: { type: string }
        replyContent: { type: string }
        createdAt: { type: string, format: date-time }

    PaymentInitDTO:
      type: object
      required: [orderId, paymentMethod]
      properties:
        orderId: { type: integer, format: int64 }
        paymentMethod: { type: string, enum: [WECHAT, ALIPAY, BALANCE] }

    PaymentVO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        orderId: { type: integer, format: int64 }
        amount: { type: number }
        paymentMethod: { type: string }
        status: { type: string }
        transactionNo: { type: string }
        authorizedAt: { type: string, format: date-time }
        capturedAt: { type: string, format: date-time }

    PaymentResultVO:
      type: object
      properties:
        prepayId: { type: string, description: '微信预支付ID（用于拉起支付）' }
        paySign: { type: string }
        timeStamp: { type: string }
        nonceStr: { type: string }

    WithdrawalVO:
      type: object
      properties:
        id: { type: integer, format: int64 }
        amount: { type: number }
        status: { type: string }
        createdAt: { type: string, format: date-time }
        completedAt: { type: string, format: date-time }

    PageResultReviewVO:
      type: object
      properties:
        code: { type: integer }
        message: { type: string }
        data:
          type: object
          properties:
            list:
              type: array
              items: { $ref: '#/components/schemas/ReviewVO' }
            total: { type: integer }

    ResultPaymentVO:
      type: object
      properties:
        code: { type: integer }
        message: { type: string }
        data: { $ref: '#/components/schemas/PaymentVO' }

    ResultPaymentResultVO:
      type: object
      properties:
        code: { type: integer }
        message: { type: string }
        data: { $ref: '#/components/schemas/PaymentResultVO' }

    PageResultWithdrawalVO:
      type: object
      properties:
        code: { type: integer }
        message: { type: string }
        data:
          type: object
          properties:
            list:
              type: array
              items: { $ref: '#/components/schemas/WithdrawalVO' }
            total: { type: integer }
