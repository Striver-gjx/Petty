# Petty 本地开发/部署环境
# 使用方法: docker-compose up -d

version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: petty-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/petty?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: petty
      SPRING_DATASOURCE_PASSWORD: petty123
      PETTY_JWT_SECRET: petty-production-jwt-secret-key-change-in-prod
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3

  admin-web:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
    container_name: petty-admin-web
    ports:
      - "3000:80"
    depends_on:
      - backend

  mysql:
    image: mysql:8.0
    container_name: petty-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: petty
      MYSQL_USER: petty
      MYSQL_PASSWORD: petty123
    ports:
      - "3306:3306"
    volumes:
      - petty-mysql-data:/var/lib/mysql
      - ./database/V001__init_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: petty-redis
    ports:
      - "6379:6379"
    volumes:
      - petty-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  petty-mysql-data:
  petty-redis-data:
