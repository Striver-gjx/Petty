# Petty 本地开发环境
# 使用方法: docker-compose up -d

version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: petty-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: petty
      MYSQL_USER: petty
      MYSQL_PASSWORD: petty123
    ports:
      - "3306:3306"
    volumes:
      - petty-mysql-data:/var/lib/mysql
      - ./database/V001__init_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: petty-redis
    ports:
      - "6379:6379"
    volumes:
      - petty-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: petty-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: petty
      RABBITMQ_DEFAULT_PASS: petty123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - petty-rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  petty-mysql-data:
  petty-redis-data:
  petty-rabbitmq-data:
